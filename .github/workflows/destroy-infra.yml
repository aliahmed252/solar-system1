name: Destroy Infra
on:
  workflow_dispatch: 

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      
      - name: Destroy EKS Node Group
        run: |
          cd terraform
          terraform destroy -target=aws_eks_node_group.eks_node_group -auto-approve

      - name: Destroy EKS Cluster
        run: |
          cd terraform
          terraform destroy -target=aws_eks_cluster.eks -auto-approve

 
      - name: Destroy NAT Gateways
        run: |
          cd terraform
          terraform destroy -target=aws_nat_gateway.this -auto-approve

      - name: destroy subnet public
        run: |
          cd terraform
          terraform destroy -target=aws_subnet.public -auto-approve
          terraform destroy -target=aws_subnet.private -auto-approve

  
      - name: Destroy Remaining Infrastructure
        run: |
          cd terraform

          terraform destroy -auto-approve


