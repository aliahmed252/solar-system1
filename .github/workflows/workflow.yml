name: solar system workflow
on:
  push:
    branches: ["main", "feature/*"]

env:
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superdata' #the link connection to database
  #(mongodb+srv://> the type of connection) (supercluster>the name of server/cluster) (/superdata > the name of database ) 
  MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
  unit_testing:
    strategy:
      matrix:
        nodejs_version: [18,19,20]
        os: [ubuntu-latest]
        exclude: # here i say i dont want the nodejs_version: 19 run with os macos-latest
        - nodejs_version: 19
          os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: setup node-js version - ${{ matrix.nodejs_version}}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.nodejs_version }}
      - name: install npm # npm (node package manager )
        run: npm install
      - name: unit_testing
        id: test-job
        run: npm test
      - name: archive test result
        if steps.test-job.outcome == "failure" || steps.test-job == "success" #here i say if the step (unit_testing) 
        #fail or pass the job (archive test result) will continue and upload the artifact
        uses: actions/upload-artifact@v6
        with:
          name: Mocha-Test-Result
          path: test-result.xml