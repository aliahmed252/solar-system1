apiVersion: apps/v1
kind: Deployment
metadata:
 name: microservice
spec:
  replicas: 2
  selector:
   matchLabels:
    app: microservice
  template:
   metadata:
    labels:
     app: microservice
   spec:
    containers:
    - name: microservice
      image: ${K8S_IMAGE}
      ports:
      - containerPort: 3000
